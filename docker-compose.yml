services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  crunchy:
    image: ${CRUNCHY_IMAGE:-ghcr.io/avnogy/crunchy:latest}
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./config:/config
      - ${OUTPUT_PATH:-./output}:/data/output
      - shared_temp:/data/temp
    depends_on:
      - redis

  ffmpeg-worker:
    image: ${CRUNCHY_IMAGE:-ghcr.io/avnogy/crunchy:latest}
    volumes:
      - ${OUTPUT_PATH:-./output}:/data/output
      - ./config:/config
      - shared_temp:/data/temp
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FFMPEG_FLAGS=${FFMPEG_FLAGS:-}
    entrypoint: ["/entrypoint.sh"]
    command: ["python", "-m", "worker.ffmpeg"]
    depends_on:
      - redis

volumes:
  redis_data:
  shared_temp:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: rw
