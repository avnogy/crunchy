services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  crunchy:
    image: ${CRUNCHY_IMAGE:-ghcr.io/avnogy/crunchy:latest}
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      # Persist app settings.
      - ./config:/config
      # Store completed downloads.
      - ./output:${OUTPUT_DIR:-/data/output}
    tmpfs:
      - ${TRANSCODING_TEMP_DIR:-/data/temp}:rw,size=4g
    depends_on:
      - redis

  ffmpeg-worker:
    image: ${CRUNCHY_IMAGE:-ghcr.io/avnogy/crunchy:latest}
    volumes:
      - ./output:${OUTPUT_DIR:-/data/output}
      - ./config:/config
      - ${TRANSCODING_TEMP_DIR:-/data/temp}:${TRANSCODING_TEMP_DIR:-/data/temp}
    environment:
      - OUTPUT_DIR=${OUTPUT_DIR:-/data/output}
      - TRANSCODING_TEMP_DIR=${TRANSCODING_TEMP_DIR:-/data/temp}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FFMPEG_FLAGS=${FFMPEG_FLAGS:-}
    command: python -m app.ffmpeg_worker
    depends_on:
      - redis

volumes:
  redis_data:
