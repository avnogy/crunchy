services:
  crunchy:
    build:
      context: .
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    env_file:
      - .env
    volumes:
      # Persist app settings.
      - ./config:/config
      # Store completed downloads.
      - ./output:${OUTPUT_DIR:-/data/output}
    tmpfs:
      - ${TRANSCODING_TEMP_DIR:-/data/temp}:rw,size=4g
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command:
      - uvicorn
      - app.main:app
      - --host
      - ${APP_HOST:-0.0.0.0}
      - --port
      - "${APP_PORT:-8000}"
      - --reload
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./Dockerfile
