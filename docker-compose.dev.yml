services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  crunchy:
    build:
      context: .
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      # Persist app settings.
      - ./config:/config
      # Store completed downloads.
      - ${OUTPUT_PATH:-./output}:/data/output
    tmpfs:
      - /data/temp:rw
    command:
      - uvicorn
      - app.main:app
      - --host
      - ${APP_HOST:-0.0.0.0}
      - --port
      - "${APP_PORT:-8000}"
      - --reload
    depends_on:
      - redis
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app
        - action: sync+restart
          path: ./worker
          target: /app/worker
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./Dockerfile

  ffmpeg-worker:
    build:
      context: .
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    volumes:
      - ${OUTPUT_PATH:-./output}:/data/output
      - ./config:/config
    tmpfs:
      - /data/temp:rw
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FFMPEG_FLAGS=${FFMPEG_FLAGS:-}
    entrypoint: ["/entrypoint.sh"]
    command: ["python", "-m", "worker.ffmpeg"]
    depends_on:
      - redis
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app
        - action: sync+restart
          path: ./worker
          target: /app/worker
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./Dockerfile

volumes:
  redis_data:
