services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  crunchy:
    build:
      context: .
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      # Persist app settings.
      - ./config:/config
      # Store completed downloads.
      - ./output:${OUTPUT_DIR:-/data/output}
    tmpfs:
      - ${TRANSCODING_TEMP_DIR:-/data/temp}:rw,size=4g
    command:
      - uvicorn
      - app.main:app
      - --host
      - ${APP_HOST:-0.0.0.0}
      - --port
      - "${APP_PORT:-8000}"
      - --reload
    depends_on:
      - redis
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./Dockerfile

  ffmpeg-worker:
    build:
      context: .
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    volumes:
      - ./output:${OUTPUT_DIR:-/data/output}
      - ./config:/config
      - ${TRANSCODING_TEMP_DIR:-/data/temp}:${TRANSCODING_TEMP_DIR:-/data/temp}
    command:
      - python
      - -m
      - app.ffmpeg_worker
    environment:
      - OUTPUT_DIR=${OUTPUT_DIR:-/data/output}
      - TRANSCODING_TEMP_DIR=${TRANSCODING_TEMP_DIR:-/data/temp}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - FFMPEG_FLAGS=${FFMPEG_FLAGS:-}
    depends_on:
      - redis
    develop:
      watch:
        - action: sync+restart
          path: ./app
          target: /app/app
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./Dockerfile

volumes:
  redis_data:
